name: CI — ProLine CAD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff>=0.4.0
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test-p0:
    name: P0 Critical Tests (must pass)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[all]"
      - name: Run P0 tests (spikes)
        working-directory: spikes
        run: python -m pytest -m p0 --tb=short -v
      - name: Run Agent unit tests
        run: python -m pytest agents/ -m "unit or not integration" --tb=short -v --ignore=agents/orchestrator
        continue-on-error: true  # Agent 测试在初期允许失败

  test-full:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -e ".[all]"
      - name: Run all spike tests (non-slow, non-gpu)
        working-directory: spikes
        run: python -m pytest -m "not slow and not gpu" --tb=short -v --junitxml=../test-results/spikes.xml
        continue-on-error: true
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
