name: "\U0001F41B Bug 报告"
description: "报告一个 Bug"
title: "[Bug] <简短描述>"
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: 受影响组件
      options:
        - "ParseAgent (Agent1)"
        - "ConstraintAgent (Agent2)"
        - "LayoutAgent (Agent3)"
        - "Orchestrator"
        - "Shared Library"
        - "Spike Tests"
        - "Infrastructure (Docker/DB)"
        - "CI/CD"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: "清晰描述问题"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 执行命令 `cd spikes && pytest -m p0`
        2. 观察到 ...
        3. 期望 ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志 / 截图
      description: "粘贴相关的错误输出"
      render: shell

  - type: input
    id: environment
    attributes:
      label: 环境信息
      placeholder: "Python 3.11, Windows 11, Docker 24.0"
