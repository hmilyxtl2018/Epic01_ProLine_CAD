[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    p0: P0优先级 — 阻塞型，必须通过
    p1: P1优先级 — 重要，影响MVP范围
    p2: P2优先级 — 可延后，影响V1.0范围
    spike1: Spike-1 DWG/RVT底图解析
    spike2: Spike-2 MCP协议端到端通信
    spike3: Spike-3 碰撞检测与实时自愈
    spike4: Spike-4 SimPy DES仿真
    spike5: Spike-5 LLM工艺约束提取
    spike6: Spike-6 Temporal工作流编排
    spike7: Spike-7 3D渲染与实时交互
    spike8: Spike-8 PINN代理模型加速
    spike9: Spike-9 RAG知识检索
    spike10: Spike-10 报告生成
    slow: 执行耗时较长的测试
    integration: 需要外部服务的集成测试
    gpu: 需要GPU的测试
addopts = -v --tb=short --strict-markers
