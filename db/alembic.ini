# Alembic configuration -- ProLine CAD
# Version-controlled DDL lives under db/alembic/versions/.
# DSN is resolved from POSTGRES_DSN env var (see env.py); this file holds
# only static settings. ASCII-only to avoid Windows GBK locale issues with
# Alembic's configparser reader.

[alembic]
script_location = db/alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8
timezone = UTC

# Placeholder -- env.py overrides with POSTGRES_DSN at runtime.
sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
